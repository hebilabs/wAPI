{% extends "base.html" %}
{% block content %}

<h2 class="text-2xl mb-6">Carrito</h2>

<form id="cartForm" class="space-y-4 max-w-md">
    <input name="user_id" placeholder="User ID" class="w-full p-2 text-black rounded">

    <input name="product_id" placeholder="Product ID" class="w-full p-2 text-black rounded">

    <input name="quantity" placeholder="Quantity" class="w-full p-2 text-black rounded">

    <button class="bg-green-600 px-4 py-2 rounded w-full">
        Agregar
    </button>
</form>

<div id="cartResult" class="mt-4"></div>

{% endblock %}
