{% extends "base.html" %} {% block content %}

<div class="min-h-screen bg-white py-12 px-6">
  <div class="max-w-5xl mx-auto">
    <div
      class="border-b border-black pb-8 mb-12 flex flex-col md:flex-row justify-between items-end gap-4"
    >
      <div>
        <h2
          class="text-xs font-bold uppercase tracking-[0.5em] text-zinc-400 mb-2"
        >
          Shopping Bag
        </h2>
        <h1 class="text-5xl font-black uppercase tracking-tighter text-black">
          Your Selection.
        </h1>
      </div>
      <p class="text-[10px] font-bold uppercase tracking-widest text-zinc-400">
        Items are reserved for 30 minutes
      </p>
    </div>

    <div class="flex flex-col lg:flex-row gap-16">
      <div class="lg:w-2/3">
        <div id="cartItems" class="divide-y divide-zinc-100"></div>

        <div id="emptyCart" class="hidden py-20 text-center">
          <p class="text-zinc-400 uppercase tracking-widest text-xs">
            Your bag is empty
          </p>
          <a
            href="/shop"
            class="mt-4 inline-block text-sm font-black underline decoration-2 underline-offset-8"
            >Go Shopping</a
          >
        </div>
      </div>

      <div class="lg:w-1/3">
        <div class="bg-zinc-50 p-8 sticky top-24">
          <h3
            class="text-xs font-black uppercase tracking-widest mb-8 border-b border-zinc-200 pb-4"
          >
            Order Summary
          </h3>

          <div class="pt-6 mb-8 flex justify-between items-end">
            <span class="text-sm font-black uppercase tracking-widest"
              >Total</span
            >
            <div class="text-right">
              <span
                class="text-3xl font-black tracking-tighter font-sans leading-none block"
                >$<span id="cartTotal">0</span></span
              >
              <span class="text-[9px] text-zinc-400 uppercase tracking-widest"
                >Taxes included</span
              >
            </div>
          </div>

          <button
            onclick="checkout()"
            class="w-full bg-black text-white py-5 font-bold uppercase text-xs tracking-[0.3em] hover:bg-zinc-800 transition-all flex items-center justify-center group"
          >
            Proceed to Checkout
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
              class="size-4 ml-2 transition-transform group-hover:translate-x-1"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"
              />
            </svg>
          </button>

          <div class="mt-8 flex justify-center gap-4 opacity-30 grayscale">
            <i class="fab fa-cc-visa text-2xl"></i>
            <i class="fab fa-cc-mastercard text-2xl"></i>
            <i class="fab fa-apple-pay text-2xl"></i>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', path='cart.js') }}"></script>

{% endblock %}
