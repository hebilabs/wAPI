{% extends "base.html" %} {% block content %}

<div class="max-w-3xl mx-auto p-6">
  <h2 class="text-2xl font-bold mb-6">Your Cart</h2>
  <div id="cartItems" class="space-y-4"></div>
  <div class="flex justify-between items-center mt-6">
    <div class="mt-6 text-xl font-semibold text-gray-600 font-sans">
      Total: <span class="text-gray-900">$</span
      ><span id="cartTotal" class="text-gray-900 font-mono">0</span>
    </div>
    <button
      onclick="checkout()"
      class="mt-4 px-4 py-2 bg-gray-500 text-white rounded hover:bg-black duration-300 flex gap-2 items-center justify-center"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-6"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
        />
      </svg>

      Checkout
    </button>
  </div>
</div>

<script src="{{ url_for('static', path='cart.js') }}"></script>

{% endblock %}
