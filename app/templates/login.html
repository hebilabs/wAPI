{% extends "base.html" %} {% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white shadow-xl rounded-xl p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
      Welcome Back
    </h2>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-600 mb-1">Email</label>
        <input
          type="email"
          id="email"
          class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-black"
          placeholder="you@example.com"
        />
        <p id="emailError" class="text-red-500 text-sm hidden mt-1"></p>
      </div>

      <div>
        <label class="block text-sm text-gray-600 mb-1">Password</label>
        <input
          type="password"
          id="password"
          class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-black"
          placeholder="••••••••"
        />
        <p id="passwordError" class="text-red-500 text-sm hidden mt-1"></p>
      </div>

      <button
        id="loginBtn"
        type="submit"
        class="w-full bg-black text-white py-2 rounded-lg hover:bg-gray-800 transition disabled:opacity-50"
      >
        Login
      </button>

      <p id="loginError" class="text-red-600 text-center text-sm hidden"></p>
    </form>
  </div>
</div>

<script src="{{ url_for('static', path='auth.js') }}"></script>

{% endblock %}
