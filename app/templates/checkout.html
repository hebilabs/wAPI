{% extends "base.html" %} {% block content %}

<div class="min-h-screen bg-white">
  <div class="max-w-7xl mx-auto flex flex-col lg:flex-row">
    <div class="lg:w-7/12 p-8 lg:p-20 border-r border-zinc-100">
      <div class="max-w-md mx-auto">
        <h2
          class="text-xs font-bold uppercase tracking-[0.5em] text-zinc-400 mb-2"
        >
          Secure Checkout
        </h2>
        <h1 class="text-4xl font-black uppercase tracking-tighter mb-12">
          Payment Details.
        </h1>

        <form id="checkoutForm" class="space-y-10">
          <div class="space-y-6">
            <h3
              class="text-[10px] font-black uppercase tracking-widest border-b border-black pb-2"
            >
              01. Shipping
            </h3>
            <div class="relative">
              <input
                type="text"
                placeholder="Full Address"
                class="w-full border-b border-zinc-200 py-3 focus:outline-none focus:border-black transition-colors text-sm"
              />
            </div>
            <div class="grid grid-cols-2 gap-4">
              <input
                type="text"
                placeholder="City"
                class="border-b border-zinc-200 py-3 focus:outline-none focus:border-black transition-colors text-sm"
              />
              <input
                type="text"
                placeholder="Postal Code"
                class="border-b border-zinc-200 py-3 focus:outline-none focus:border-black transition-colors text-sm"
              />
            </div>
          </div>

          <div class="space-y-6 pt-10">
            <h3
              class="text-[10px] font-black uppercase tracking-widest border-b border-black pb-2"
            >
              02. Payment Method
            </h3>

            <div
              class="w-full aspect-[1.6/1] bg-gradient-to-br from-zinc-900 to-black rounded-xl p-8 text-white flex flex-col justify-between shadow-2xl mb-8 relative overflow-hidden group"
            >
              <div
                class="absolute top-0 right-0 p-8 opacity-20 text-4xl italic font-black"
              >
                wAPI
              </div>
              <div class="flex justify-between items-start">
                <svg
                  class="w-12 h-12"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1"
                >
                  <rect x="2" y="5" width="20" height="14" rx="2" />
                  <line x1="2" y1="10" x2="22" y2="10" />
                </svg>
                <span
                  class="text-[10px] tracking-widest uppercase font-bold opacity-50 italic"
                  >Digital Vault</span
                >
              </div>
              <div class="space-y-4">
                <p
                  id="cardDisplayNumber"
                  class="text-xl tracking-[0.2em] font-mono"
                >
                  •••• •••• •••• ••••
                </p>
                <div
                  class="flex justify-between uppercase text-[8px] tracking-widest opacity-60"
                >
                  <span>Card Holder</span>
                  <span>Expires</span>
                </div>
              </div>
            </div>

            <div class="space-y-4">
              <input
                type="text"
                id="cardNumber"
                placeholder="Card Number"
                class="w-full border-b border-zinc-200 py-3 focus:outline-none focus:border-black transition-colors font-mono text-sm"
                maxlength="19"
              />
              <div class="grid grid-cols-2 gap-4">
                <input
                  type="text"
                  placeholder="MM/YY"
                  class="border-b border-zinc-200 py-3 focus:outline-none focus:border-black transition-colors font-mono text-sm"
                />
                <input
                  type="password"
                  placeholder="CVC"
                  class="border-b border-zinc-200 py-3 focus:outline-none focus:border-black transition-colors font-mono text-sm"
                />
              </div>
            </div>
          </div>

          <button
            type="submit"
            class="w-full bg-black text-white py-5 font-bold uppercase text-xs tracking-[0.4em] hover:bg-zinc-800 transition-all active:scale-[0.98]"
          >
            Authorize Payment
          </button>
        </form>
      </div>
    </div>

    <div class="lg:w-5/12 bg-zinc-50 p-8 lg:p-20">
      <div class="sticky top-10">
        <h3
          class="text-xs font-black uppercase tracking-widest mb-8 border-b border-zinc-200 pb-4"
        >
          Order Review
        </h3>

        <div
          id="checkoutItems"
          class="space-y-6 mb-12 max-h-[40vh] overflow-y-auto pr-4"
        >
          <div class="flex gap-4">
            <div class="w-16 h-20 bg-zinc-200 flex-shrink-0"></div>
            <div class="flex-1 flex justify-between">
              <div>
                <p class="text-[10px] font-black uppercase">Sample Product</p>
                <p class="text-[9px] text-zinc-400 uppercase tracking-widest">
                  Size: M / Qty: 1
                </p>
              </div>
              <p class="text-[10px] font-bold font-mono">$45.00</p>
            </div>
          </div>
        </div>

        <div class="space-y-3 border-t border-zinc-200 pt-8">
          <div
            class="flex justify-between text-[10px] uppercase tracking-widest text-zinc-400"
          >
            <span>Subtotal</span>
            <span class="font-mono text-black"
              >$<span id="subtotal">0</span></span
            >
          </div>
          <div
            class="flex justify-between text-[10px] uppercase tracking-widest text-zinc-400"
          >
            <span>Shipping</span>
            <span class="font-mono text-black font-bold italic">FREE</span>
          </div>
          <div class="flex justify-between items-end pt-4">
            <span
              class="text-xs font-black uppercase tracking-widest text-black"
              >Total Amount</span
            >
            <span
              class="text-3xl font-black font-sans leading-none tracking-tighter"
              >$<span id="finalTotal">0</span></span
            >
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', path='checkout.js') }}"></script>
{% endblock %}
